<!doctype html>
<html lang="ar" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Education</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="./img/header/header_logo.png"
      type="image/x-icon"
    />
    <style>
      /* تخصيصات إضافية لتطابق الألوان والتصميم */
      body {
        background-color: #f4f7f9; /* لون الخلفية الفاتح */
        font-family: sans-serif;
      }
      .bg-custom-yellow {
        background-color: #ffcc00 !important;
        color: #000 !important;
        font-weight: 500;
      }
      .btn-outline-custom {
        border: 1px solid #999;
        color: #333;
        background-color: #fff;
      }
      .btn-outline-custom:hover {
        background-color: #f0f0f0;
      }
      .hero-title {
        color: #0a2540;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 shadow-sm">
        <div class="container">
          <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="./img/header/header_logo.png" alt="Logo" height="40" />
            <!-- التعديل هنا: يختفي في الموبايل d-none ويظهر في الكمبيوتر d-lg-inline -->
            <span class="fw-bold fs-4 text-dark d-none d-lg-inline ms-2"
              >For Education</span
            >
          </a>

          <div class="d-flex align-items-center d-lg-none ms-auto">
            <a href="#" class="btn bg-custom-yellow px-3 py-2 me-2 btn-sm"
              >Sign up</a
            >
            <button
              class="navbar-toggler border-0"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarNav"
            >
              <span class="navbar-toggler-icon"></span>
            </button>
          </div>

          <div
            class="collapse navbar-collapse justify-content-center"
            id="navbarNav"
          >
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0 fw-semibold text-center">
              <li class="nav-item mx-2">
                <a class="nav-link active text-primary" href="#">Home</a>
              </li>
              <li class="nav-item mx-2">
                <a class="nav-link" href="#">About</a>
              </li>
              <li class="nav-item mx-2">
                <a class="nav-link" href="#">Course</a>
              </li>
              <li class="nav-item mx-2">
                <a class="nav-link" href="#">Contact</a>
              </li>
            </ul>
          </div>

          <div class="d-none d-lg-flex align-items-center">
            <a href="#" class="btn bg-custom-yellow px-4 py-2 me-3">Sign up</a>
            <button class="btn btn-outline-secondary border px-3 py-2">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="currentColor"
                class="bi bi-search"
                viewBox="0 0 16 16"
              >
                <path
                  d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"
                />
              </svg>
            </button>
          </div>
        </div>
      </nav>
    </header>

    <div class="container my-5 py-lg-5">
      <div class="row align-items-center flex-column-reverse flex-lg-row">
        <div class="col-lg-6 text-center text-lg-start mt-4 mt-lg-0">
          <div
            class="bg-white p-4 p-sm-5 shadow-sm rounded-3 d-block d-lg-none"
          >
            <h2 class="fw-bold mb-3" style="color: #002b49; font-size: 1.8rem">
              Become Master
            </h2>
            <p
              class="fs-4 mb-4"
              style="
                color: #002b49;
                font-family: Georgia, serif;
                line-height: 1.4;
              "
            >
              Learn New Skills Online Find Best Courses
            </p>
            <div class="d-flex justify-content-center gap-2">
              <a
                href="#"
                class="btn bg-custom-yellow px-3 py-2 fw-semibold btn-sm fs-6 flex-grow-1"
                >Get A Quote</a
              >
              <a
                href="#"
                class="btn btn-outline-custom px-3 py-2 fw-semibold btn-sm fs-6 flex-grow-1 shadow-sm"
                >Read more</a
              >
            </div>
          </div>

          <div class="d-none d-lg-block">
            <h5
              class="fw-bold mb-2 fs-3"
              style="color: #002b49;  font-size: 1.8rem;"
            >
              Become Master
            </h5>
            <h1 class="hero-title mb-4 lh-base fw-bold display-5">
              Learn New Skills <br />
              Online Find Best Courses
            </h1>
            <div class="d-flex gap-3">
              <a href="#" class="btn bg-custom-yellow px-4 py-3 fw-bold"
                >Get A Quote</a
              >
              <a
                href="#"
                class="btn btn-outline-custom px-4 py-3 fw-bold shadow-sm"
                >Read more</a
              >
            </div>
          </div>
        </div>

        <div class="col-lg-6 text-center mb-4 mb-lg-0">
          <img
            src="./img/main/main_pic.png"
            alt="Education Illustration"
            class="img-fluid w-75 w-lg-100"
            style="max-height: 380px"
          />
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
